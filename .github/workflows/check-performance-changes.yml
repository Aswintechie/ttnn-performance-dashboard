name: Check Performance Changes

# Trigger when new performance data is pushed to the repository
on:
  push:
    paths:
      - 'data/daily/*.json'
      - 'data/index.json'
      - 'data/latest/latest_results.json'
  workflow_dispatch: # Allow manual triggering for testing
    inputs:
      send_test_email:
        description: 'Send a test email to verify the email notification system works (no real performance data required)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  check-performance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Fetch at least 2 commits to ensure we have the latest data

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Check for performance changes
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: 'aswin@aswincloud.com'
          PERF_CHANGE_THRESHOLD: '20.0'
          SEND_TEST_EMAIL: ${{ inputs.send_test_email && 'true' || 'false' }}
          # FROM_EMAIL: Set this to use a verified domain (e.g., 'TTNN Alerts <alerts@yourdomain.com>')
          # If not set, defaults to 'onboarding@resend.dev' which can only send to Resend account owner
          FROM_EMAIL: ${{ secrets.FROM_EMAIL || '' }}
        run: |
          echo "🔍 Checking for performance changes..."
          python check_perf_changes.py
          exit_code=$?
          if [ $exit_code -eq 0 ]; then
            echo "✅ Performance check completed successfully"
          else
            echo "⚠️ Performance check completed with warnings or errors"
          fi
          exit $exit_code
